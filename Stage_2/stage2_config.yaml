  1: 0.70
  2: 0.50
  3: 0.30

# ── Location scoring — ADDITIVE penalty (not multiplicative multiplier)
# Why additive: multiplicative 0.35 took raw=0.90 → 0.315, burying exceptional
# abroad engineers below mediocre India candidates. Additive max=0.18 takes
# raw=0.90 → ≥0.72 (floor: pre_location × location_floor_factor).
#
# Data: India-target=68%, Abroad-no-relocate=16%, India-premium=8.9%, Abroad-relocate=7.2%
premium_cities:
  - noida
  - pune
target_cities:
  - hyderabad
  - bangalore
  - bengaluru
  - mumbai
  - delhi
  - gurgaon
  - gurugram
  - chennai
  - ncr

# Additive penalties — subtracted from pre_location score
location_penalties:
  india_premium: 0.00        # noida / pune — JD office cities, zero penalty
  india_target: 0.03         # major metros — easy commute / likely hybrid
  india_other_willing: 0.06  # tier-2/3 city, willing to relocate
  india_other: 0.10          # tier-2/3 city, not willing to relocate
  abroad_willing: 0.12       # outside India, willing to relocate
  abroad_no_relocate: 0.18   # outside India, not relocating (max penalty)

# Floor: final_score >= pre_location * location_floor_factor
# Prevents compound stacking (honeypot + location) from crushing strong candidates.
# At 0.60 floor: a pre_location=0.90 abroad candidate lands >= 0.54.
location_floor_factor: 0.60

# ── ML YoE saturation: 60 months (5 years) = full score
# Data: ml_months mean=39, median=38 — good discrimination at 60mo ceiling
ml_yoe_saturation_months: 60

